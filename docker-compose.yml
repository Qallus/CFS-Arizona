services:
  cfs-arizona:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.cfsarizona.com}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # NextAuth
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.cfsarizona.com}

      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.cfsarizona.com}

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}

      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_SMS_PHONE_NUMBER: ${TWILIO_SMS_PHONE_NUMBER}
      TWILIO_TWIML_APP_SID: ${TWILIO_TWIML_APP_SID}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID}
      TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET}

      # Email
      EMAIL_ADDRESS: ${EMAIL_ADDRESS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_PORT: ${IMAP_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}

      # OpenAI (transcription / non-agent features)
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Square
      SQUARE_APPLICATION_ID: ${SQUARE_APPLICATION_ID}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN}
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID}
      SQUARE_WEBHOOK_SIGNATURE: ${SQUARE_WEBHOOK_SIGNATURE}

      # Optional
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      NOCODB_BASE_URL: ${NOCODB_BASE_URL:-}
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      CALCOM_BASE_URL: ${CALCOM_BASE_URL:-}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET:-}
      DIRECTUS_BASE_URL: ${DIRECTUS_BASE_URL:-}
      DIRECTUS_ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-}
      MAILPURSE_URL: ${MAILPURSE_URL:-}
      MAILPURSE_API_KEY: ${MAILPURSE_API_KEY:-}
      WP_SITE_URL: ${WP_SITE_URL:-}
      WP_APPLICATION_USERNAME: ${WP_APPLICATION_USERNAME:-}
      WP_APPLICATION_PASSWORD: ${WP_APPLICATION_PASSWORD:-}
      WP_REST_API_URL: ${WP_REST_API_URL:-}

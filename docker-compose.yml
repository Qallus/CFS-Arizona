services:
  sig360:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Hermes Agent — internal docker network URL
      HERMES_GATEWAY_URL: http://hermes:18789
      HERMES_GATEWAY_TOKEN: ${HERMES_GATEWAY_TOKEN}
      HERMES_WORKSPACE: /hermes/workspace

      # NextAuth
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://sig360.com

      # App
      NEXT_PUBLIC_APP_URL: https://sig360.com

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}

      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_SMS_PHONE_NUMBER: ${TWILIO_SMS_PHONE_NUMBER}
      TWILIO_TWIML_APP_SID: ${TWILIO_TWIML_APP_SID}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID}
      TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET}

      # Email
      EMAIL_ADDRESS: ${EMAIL_ADDRESS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_PORT: ${IMAP_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}

      # OpenAI (transcription / non-agent features)
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Square
      SQUARE_APPLICATION_ID: ${SQUARE_APPLICATION_ID}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN}
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID}
      SQUARE_WEBHOOK_SIGNATURE: ${SQUARE_WEBHOOK_SIGNATURE}

      # Optional
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      NOCODB_BASE_URL: ${NOCODB_BASE_URL:-}
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      CALCOM_BASE_URL: ${CALCOM_BASE_URL:-}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET:-}
      DIRECTUS_BASE_URL: ${DIRECTUS_BASE_URL:-}
      DIRECTUS_ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-}
      MAILPURSE_URL: ${MAILPURSE_URL:-}
      MAILPURSE_API_KEY: ${MAILPURSE_API_KEY:-}
      WP_SITE_URL: ${WP_SITE_URL:-}
      WP_APPLICATION_USERNAME: ${WP_APPLICATION_USERNAME:-}
      WP_APPLICATION_PASSWORD: ${WP_APPLICATION_PASSWORD:-}
      WP_REST_API_URL: ${WP_REST_API_URL:-}
    volumes:
      # Bind-mount so DNA/memory files are version-controlled in ./hermes/workspace
      - ./hermes/workspace:/hermes/workspace
    depends_on:
      hermes:
        condition: service_healthy

  hermes:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Clone Hermes Agent on first boot; subsequent restarts are instant via the app volume
    command: >
      sh -c "
        if [ ! -f /app/package.json ]; then
          apk add --no-cache git &&
          git clone https://github.com/NousResearch/hermes-agent.git /app;
        fi &&
        npm install --omit=dev &&
        npm start
      "
    environment:
      # LLM provider keys — Hermes uses these for AI completions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Gateway auth token — must match HERMES_GATEWAY_TOKEN in sig360 service
      HERMES_TOKEN: ${HERMES_GATEWAY_TOKEN}

      # Workspace — bind-mounted from ./hermes/workspace on the host
      HERMES_WORKSPACE: /hermes/workspace

      PORT: "18789"
    ports:
      # Internal only — Coolify reverse proxy handles external HTTPS
      - "127.0.0.1:18789:18789"
    volumes:
      - ./hermes/workspace:/hermes/workspace
      - hermes-app:/app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  # hermes-app persists the cloned Hermes repo across restarts (no re-clone needed)
  hermes-app:
